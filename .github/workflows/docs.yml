name: Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Configure git for mike
        run: |
          git config user.name "Mohsen Seyedkazemi Ardebili"
          git config user.email "mohsen.seyedkazemi@gmail.com"

      - name: Deploy 0.1.0 (on push to main)
        if: github.ref == 'refs/heads/main'
        run: uv run mike deploy --push --update-aliases 0.1.0 latest

      - name: Deploy version + update latest (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          uv run mike deploy --push --update-aliases "$VERSION" latest

      - name: Set default version to latest
        run: uv run mike set-default --push latest
