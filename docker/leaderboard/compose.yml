services:
  aobench-leaderboard-api:
    build:
      context: ../..
      dockerfile: docker/leaderboard/Dockerfile
    image: aobench-leaderboard:latest
    container_name: aobench-leaderboard
    ports:
      - "8000:8000"
    volumes:
      - aobench-leaderboard-data:/app/data/leaderboard
    environment:
      LEADERBOARD_ADMIN_PASS: ${LEADERBOARD_ADMIN_PASS:-change-me}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  aobench-leaderboard-data:
